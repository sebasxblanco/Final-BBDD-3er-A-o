{% extends 'base.html' %}
{% block title %}Iniciar Sesión — UCJC{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 col-sm-8">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-mortarboard-fill"></i> UCJC Académico</h4>
        <small>Sistema de Gestión Académica</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" required autofocus
                   placeholder="admin / profesor1 / alumno1">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" required
                   placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
          </button>
        </form>
      </div>
      <div class="card-footer text-muted text-center small py-2">
        Credenciales de prueba generadas por <strong>dag_usuarios</strong>
      </div>
    </div>
  </div>
</div>
{% endblock %}

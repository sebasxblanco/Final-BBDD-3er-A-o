{% extends 'base.html' %}
{% block title %}{{ 'Editar' if profesor else 'Nuevo' }} Profesor — UCJC{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">
          <i class="bi bi-person-badge"></i>
          {{ 'Editar profesor' if profesor else 'Nuevo profesor' }}
        </h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Nombre *</label>
            <input type="text" name="nombre" class="form-control" required
                   value="{{ profesor.nombre if profesor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido *</label>
            <input type="text" name="apellido" class="form-control" required
                   value="{{ profesor.apellido if profesor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" required
                   value="{{ profesor.email if profesor else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Departamento</label>
            <input type="text" name="departamento" class="form-control"
                   value="{{ profesor.departamento if profesor else '' }}">
          </div>
          <div class="mb-4">
            <label class="form-label">Fecha de contratación</label>
            <input type="date" name="fecha_contratacion" class="form-control"
                   value="{{ profesor.fecha_contratacion if profesor else '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save"></i> Guardar
            </button>
            <a href="{{ url_for('profesores.list_profesores') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
